name: CI-CD pipeline

on:
  push:
    branches: ["main"]

jobs:

  # -------------------------
  # 1️⃣ Build Job
  # -------------------------
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build Application
        run: mvn clean package


  # -------------------------
  # 2️⃣ Security Scan Job
  # -------------------------
  security-check:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Trivy scan for container/file vulnerabilities
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install wget gnupg -y
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install trivy -y

      - name: Trivy Scan
        run: trivy fs .

      # Gitleaks for secrets scanning
      - name: Install Gitleaks
        run: sudo apt-get install gitleaks -y

      - name: Gitleaks Scan
        run: gitleaks detect --source .


  # -------------------------
  # 3️⃣ Test Job
  # -------------------------
  test:
    runs-on: self-hosted
    needs: security-check
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Unit Tests
        run: mvn test


  # -------------------------
  # 4️⃣ SonarQube Scan Job
  # -------------------------
  sonar_scan:
    runs-on: self-hosted
    needs: test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build & SonarQube Analysis
        run: mvn clean verify sonar:sonar \
          -Dsonar.host.url=http://65.0.18.144:9000 \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}


  # -------------------------
  # 5️⃣ Docker Build & Push Job
  # -------------------------
  build_docker_image_and_push:
    runs-on: self-hosted
    needs: sonar_scan
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: app  # downloads JAR to ./app folder

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: youngminds73/bankapp:latest
          file: ./Dockerfile
